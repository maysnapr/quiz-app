<!DOCTYPE html>
<html>
<head>
    <title>Hasil Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center">Hasil Quiz</h2>
        <h3 class="text-center text-success">Score: {{ score }}</h3>

        <hr>

        {% for r in review %}
            <div class="mb-4 p-3 border rounded 
                {% if r.is_correct %} bg-success-subtle {% else %} bg-danger-subtle {% endif %}">

                <p><b>{{ loop.index }}. {{ r.question }}</b></p>

                <p>
                    Jawaban kamu: 
                    <span class="{% if r.is_correct %}text-success{% else %}text-danger{% endif %}">
                        {{ r.user_answer }}
                    </span>
                </p>

                <p>Jawaban benar: 
                    <b class="text-primary">{{ r.correct_answer }}</b>
                </p>

                <p>
                    Status: 
                    {% if r.is_correct %}
                        ✅ Benar
                    {% else %}
                        ❌ Salah
                    {% endif %}
                </p>
            </div>
        {% endfor %}

        <a href="/dashboard" class="btn btn-primary w-100">Kembali ke Dashboard</a>

    </div>
</div>

</body>
</html>
