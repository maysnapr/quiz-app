<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
<div class="card p-4 shadow">

<form method="POST" action="/submit">
{% for q in questions %}
    {% set q_index = loop.index %}

    <p><b>{{ q_index }}. {{ q.question }}</b></p>

    {% for opt in q.options %}
        <div>
            <input type="radio" name="question_{{ q_index }}" value="{{ opt }}" required>
            {{ opt }}
        </div>
    {% endfor %}

    <input type="hidden" name="correct_{{ q_index }}" value="{{ q.correct_answer }}">
    <input type="hidden" name="text_{{ q_index }}" value="{{ q.question }}">

    <br>
{% endfor %}

<button class="btn btn-primary w-100">Submit</button>
</form>

</div></div>
