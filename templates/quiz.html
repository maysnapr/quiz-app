<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — QuizApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #090e1a;
  --bg-card: #0f1726;
  --accent: #00f5c4;
  --accent2: #7b61ff;
  --accent3: #ff6b6b;
  --text: #e8edf5;
  --text-muted: #6b7a96;
  --border: rgba(0,245,196,0.12);
  --border-hover: rgba(0,245,196,0.3);
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
}

body::before {
  content: '';
  position: fixed;
  top: -20%; left: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(123,97,255,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%; right: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(0,245,196,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

h1,h2,h3,h4 { font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
h1 { font-size: 2.4rem; }
h2 { font-size: 1.8rem; }
h3 { font-size: 1.3rem; }

.page-center {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  position: relative; z-index: 1;
}

.page-content {
  width: 100%; max-width: 780px;
  margin: 0 auto;
  padding: 2rem 1rem;
  position: relative; z-index: 1;
}

.card-neo {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.5rem;
  position: relative; overflow: hidden;
  width: 100%; max-width: 420px;
}

.card-neo::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}

.card-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.25rem; color: var(--text); }
.card-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 2rem; }

.form-group { margin-bottom: 1.25rem; }

.form-label {
  display: block;
  font-size: 0.75rem; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 0.5rem;
}

.form-input {
  width: 100%; padding: 0.8rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  transition: border-color 0.2s, background 0.2s; outline: none;
}
.form-input:focus { border-color: var(--accent); background: rgba(0,245,196,0.04); }
.form-input::placeholder { color: var(--text-muted); }

.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  width: 100%; padding: 0.85rem 1.5rem;
  background: var(--accent); color: #090e1a;
  font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.04em;
  border: none; border-radius: var(--radius-sm); cursor: pointer; text-decoration: none;
  transition: opacity 0.15s, transform 0.15s; margin-top: 0.5rem;
}
.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); color: #090e1a; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  background: transparent; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  cursor: pointer; text-decoration: none; transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }

.btn-danger {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  background: rgba(255,107,107,0.1); color: var(--accent3);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  border: 1px solid rgba(255,107,107,0.2); border-radius: var(--radius-sm);
  cursor: pointer; text-decoration: none; transition: all 0.2s;
}
.btn-danger:hover { background: rgba(255,107,107,0.2); color: var(--accent3); }

.link-muted {
  display: inline-block; margin-top: 1.25rem;
  font-size: 0.875rem; color: var(--text-muted);
  text-decoration: none; text-align: center; width: 100%; transition: color 0.2s;
}
.link-muted:hover { color: var(--accent); }
.link-muted span { color: var(--accent); }

.flash { padding: 0.75rem 1rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1rem; }
.flash-error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); color: var(--accent3); }
.flash-success { background: rgba(0,245,196,0.08); border: 1px solid rgba(0,245,196,0.2); color: var(--accent); }

.dashboard-header { text-align: center; margin-bottom: 3rem; padding-top: 3rem; }
.dashboard-header h2 {
  font-size: 2.8rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 0.5rem;
}
.dashboard-header p { color: var(--text-muted); font-size: 1rem; }

.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

.dash-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 2rem 1.5rem; text-align: center; text-decoration: none;
  transition: border-color 0.2s, transform 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
}
.dash-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
.dash-card-icon { font-size: 2rem; }
.dash-card-label { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); }
.dash-card-desc { font-size: 0.8rem; color: var(--text-muted); }
.dash-card.accent { border-color: rgba(0,245,196,0.25); }
.dash-card.accent .dash-card-label { color: var(--accent); }

.quiz-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; margin-bottom: 2rem; }

.quiz-progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; }

.question-num { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; font-weight: 600; }
.question-text { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.5; }

.options-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }

.option-label {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.85rem 1.1rem;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.15s; font-size: 0.95rem;
}
.option-label:hover { background: rgba(0,245,196,0.06); border-color: rgba(0,245,196,0.25); }
.option-label input[type="radio"] {
  appearance: none; width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
}
.option-label input[type="radio"]:checked { border-color: var(--accent); background: var(--accent); box-shadow: 0 0 0 3px rgba(0,245,196,0.15); }
.option-label:has(input:checked) { background: rgba(0,245,196,0.07); border-color: rgba(0,245,196,0.3); }

.result-hero { text-align: center; padding: 3rem 0 2rem; }
.score-ring {
  display: inline-flex; align-items: center; justify-content: center;
  width: 120px; height: 120px; border-radius: 50%;
  border: 3px solid var(--accent);
  font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--accent);
  margin-bottom: 1rem; box-shadow: 0 0 30px rgba(0,245,196,0.2);
}
.result-label { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

.review-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
.review-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; position: relative; overflow: hidden; }
.review-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.review-item.correct::before { background: var(--accent); }
.review-item.wrong::before { background: var(--accent3); }
.review-q { font-weight: 500; margin-bottom: 0.75rem; font-size: 0.95rem; }
.review-answers { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.85rem; }
.review-answers .label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
.answer-correct { color: var(--accent); font-weight: 500; }
.answer-wrong { color: var(--accent3); font-weight: 500; }
.answer-right-text { color: var(--accent2); font-weight: 500; }

.status-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em; float: right; }
.status-badge.correct { background: rgba(0,245,196,0.1); color: var(--accent); border: 1px solid rgba(0,245,196,0.2); }
.status-badge.wrong { background: rgba(255,107,107,0.1); color: var(--accent3); border: 1px solid rgba(255,107,107,0.2); }

.page-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
.page-header h2 { font-size: 1.5rem; }
.logo-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }

.table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 0.75rem 1.25rem; text-align: left; border-bottom: 1px solid var(--border); }
.lb-table td { padding: 1rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.95rem; vertical-align: middle; }
.lb-table tr:last-child td { border-bottom: none; }
.lb-table tr:hover td { background: rgba(255,255,255,0.02); }
.lb-rank { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--text-muted); font-size: 0.8rem; width: 40px; }
.lb-rank.gold { color: #f5c542; }
.lb-rank.silver { color: #b0b8c8; }
.lb-rank.bronze { color: #c97b3a; }
.lb-score { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }
.lb-date { font-size: 0.8rem; color: var(--text-muted); }

@media (max-width: 600px) {
  .card-neo { padding: 1.75rem 1.25rem; }
  .quiz-wrapper { padding: 1.5rem 1rem; }
  .dashboard-header h2 { font-size: 2rem; }
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.card-neo, .quiz-wrapper, .review-item, .dash-card { animation: fadeUp 0.35s ease both; }
.review-item:nth-child(1) { animation-delay: 0.05s; }
.review-item:nth-child(2) { animation-delay: 0.1s; }
.review-item:nth-child(3) { animation-delay: 0.15s; }
.review-item:nth-child(4) { animation-delay: 0.2s; }
.review-item:nth-child(5) { animation-delay: 0.25s; }

</style>
</head>
<body>
<div class="page-content">
  <div class="page-header">
    <span class="logo-text">⚡ QuizApp</span>
    <div style="display:flex;align-items:center;gap:.75rem;">
      {% if cat %}
      <span style="font-size:.85rem;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border);padding:.4rem .9rem;border-radius:20px;">{{ cat.icon }} {{ cat.name }}</span>
      {% endif %}
      <a href="/pilih" class="btn-secondary">← Ganti Kategori</a>
    </div>
  </div>
  <div class="quiz-wrapper">
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" style="width: 0%" id="progress-bar"></div>
    </div>
    <form method="POST" action="/submit" id="quiz-form">
      {% for q in questions %}
        {% set q_index = loop.index %}
        <div class="quiz-question" id="q-{{ q_index }}" style="display: {% if loop.first %}block{% else %}none{% endif %}">
          <p class="question-num">Soal {{ q_index }} dari {{ questions|length }}</p>
          <p class="question-text">{{ q.question }}</p>
          <ul class="options-list">
            {% for opt in q.options %}
            <li>
              <label class="option-label">
                <input type="radio" name="question_{{ q_index }}" value="{{ opt }}" required>
                {{ opt }}
              </label>
            </li>
            {% endfor %}
          </ul>
          <input type="hidden" name="correct_{{ q_index }}" value="{{ q.correct_answer }}">
          <input type="hidden" name="text_{{ q_index }}" value="{{ q.question }}">
        </div>
      {% endfor %}
      <div style="display:flex; justify-content:space-between; gap:1rem;">
        <button type="button" id="prev-btn" class="btn-secondary" style="width:auto; display:none;">← Sebelumnya</button>
        <button type="button" id="next-btn" class="btn-primary" style="width:auto; flex:1">Selanjutnya →</button>
        <button type="submit" id="submit-btn" class="btn-primary" style="width:auto; flex:1; display:none;">Selesai ✓</button>
      </div>
    </form>
  </div>
</div>
<script>
  const total = {{ questions|length }};
  let current = 1;
  function updateUI() {
    for (let i = 1; i <= total; i++) {
      document.getElementById('q-' + i).style.display = (i === current) ? 'block' : 'none';
    }
    document.getElementById('prev-btn').style.display = current > 1 ? 'inline-flex' : 'none';
    document.getElementById('next-btn').style.display = current < total ? 'inline-flex' : 'none';
    document.getElementById('submit-btn').style.display = current === total ? 'inline-flex' : 'none';
    document.getElementById('progress-bar').style.width = ((current - 1) / total * 100) + '%';
  }
  document.getElementById('next-btn').addEventListener('click', () => {
    const radios = document.querySelectorAll(`input[name="question_${current}"]`);
    const checked = Array.from(radios).some(r => r.checked);
    if (!checked) { alert('Pilih jawaban dulu ya!'); return; }
    if (current < total) { current++; updateUI(); }
  });
  document.getElementById('prev-btn').addEventListener('click', () => {
    if (current > 1) { current--; updateUI(); }
  });
  updateUI();
</script>
</body>
</html>
